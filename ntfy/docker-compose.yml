services:
  ntfy:
    image: binwiederhier/ntfy
    container_name: ntfy
    command:
      - serve
    environment:
      - TZ=America/Bogota
    volumes:
      - /home/apraghatyus/homelab/ntfy/config:/etc/ntfy
      - /home/apraghatyus/homelab/ntfy/data/cache:/var/cache/ntfy
      - /home/apraghatyus/homelab/ntfy/data/lib:/var/lib/ntfy
    ports:
      - "8090:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 http://localhost:80/v1/health -O - | grep -Eo '\"healthy\"\\s*:\\s*true' || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    init: true
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
