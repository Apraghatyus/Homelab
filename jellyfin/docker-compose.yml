services:
  jellyfin:
    image: ${JELLYFIN_IMAGE}
    container_name: jellyfin
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./config:/config
      - ./cache:/cache
      - /mnt/nas/media/movies:/media/movies:ro
      - /mnt/nas/media/series:/media/series:ro
      - /mnt/nas/media/music:/media/music:ro
    ports:
      - "${JELLYFIN_PORT}:8096"
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128
    group_add:
      - "${RENDER_GID}"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8096/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
