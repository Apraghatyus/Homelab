services:
  kavita:
    image: ghcr.io/kareadita/kavita:latest
    container_name: kavita
    volumes:
      - /home/apraghatyus/homelab/kavita/config:/kavita/config
      - /mnt/nas/media/books:/books:ro,rslave
    ports:
      - 5000:5000
    environment:
      - TZ=America/Bogota
    restart: unless-stopped
    mem_limit: 512m
    cpus: 1.0
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
