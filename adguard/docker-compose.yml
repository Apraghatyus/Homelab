services:
  adguard:
    image: adguard/adguardhome:latest
    container_name: adguard-home
    restart: unless-stopped
    ports:
      # Puerto DNS — CRÍTICO: debe ser accesible desde toda la red
      - "53:53/tcp"
      - "53:53/udp"
      # Puerto web de configuración inicial (solo se usa una vez)
      - "3000:3000/tcp"
      # Puerto web UI (dashboard permanente)
      - "8089:80/tcp"
    volumes:
      - ./data/work:/opt/adguardhome/work
      - ./data/conf:/opt/adguardhome/conf
    # IMPORTANTE: cap_add necesario para bindear puerto 53
    cap_add:
      - NET_ADMIN
      - NET_BIND_SERVICE
