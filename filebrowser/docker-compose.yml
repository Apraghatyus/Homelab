services:
  filebrowser:
    image: filebrowser/filebrowser:s6
    container_name: filebrowser
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    ports:
      - "8080:80"
    volumes:
      # Directorios NAS
      - /mnt/nas/public:/srv/public
      - /mnt/nas/media:/srv/media
      - /mnt/nas/backups:/srv/backups
      - /mnt/nas/games:/srv/games
      - /mnt/nas/users:/srv/users
      # Configs del homelab (solo lectura)
      - /home/apraghatyus/homelab:/srv/homelab-configs:ro
      # Base de datos y configuración
      - /home/apraghatyus/homelab/filebrowser/filebrowser.db:/database/filebrowser.db
      - /home/apraghatyus/homelab/filebrowser/settings.json:/config/settings.json
    healthcheck:
      test: wget -q --spider http://localhost:80/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.50"